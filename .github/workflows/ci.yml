name: TRUSTNOW CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/platform-api/package-lock.json

      - name: Install Platform API deps
        working-directory: services/platform-api
        run: npm ci

      - name: TypeScript check
        working-directory: services/platform-api
        run: npx tsc --noEmit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install AI pipeline deps
        working-directory: services/ai-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff lint
        working-directory: services/ai-pipeline
        run: ruff check .

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test-api:
    name: Platform API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        working-directory: services/platform-api
        run: npm ci

      - name: Run tests
        working-directory: services/platform-api
        run: npm test -- --passWithNoTests

  test-pipeline:
    name: AI Pipeline Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        working-directory: services/ai-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: services/ai-pipeline
        run: pytest tests/ -v --tb=short || true

  # ── Docker Build Validation ──────────────────────────────────────────────────
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-api, test-pipeline]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Platform API Dockerfile
        run: |
          if [ -f services/platform-api/Dockerfile ]; then
            docker build --dry-run services/platform-api/ || true
          else
            echo "Dockerfile not yet created — skipping"
          fi

  # ── ArgoCD Sync Trigger (main branch only) ───────────────────────────────────
  notify-argocd:
    name: Notify ArgoCD
    runs-on: ubuntu-latest
    needs: docker-validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ArgoCD sync
        run: echo "ArgoCD sync would be triggered here once GitHub remote is configured"
